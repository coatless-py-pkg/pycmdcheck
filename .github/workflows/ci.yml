name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          # 3.10 matches [tool.mypy] python_version and installs tomli
          # (a conditional dependency) so mypy can resolve the tomllib fallback.
          python-version: "3.10"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev --extra linting --extra typing-mypy
      - name: Ruff (lint)
        run: uv run ruff check src/ tests/
      - name: Ruff (format)
        run: uv run ruff format --check src/ tests/
      - name: Mypy
        run: uv run mypy src/pycmdcheck

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest -q
