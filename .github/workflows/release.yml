name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Test & build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests (gate the release on green)
        run: uv run pytest -q
      - name: Build sdist and wheel
        run: uv build
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment can be configured on GitHub to require manual approval
    # before a release is published.
    environment:
      name: pypi
      url: https://pypi.org/p/pycmdcheck
    permissions:
      id-token: write  # OIDC: required for PyPI Trusted Publishing (no token)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
